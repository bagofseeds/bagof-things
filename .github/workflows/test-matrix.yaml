name: Run matrix of tests
description: Run matrix of tests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Commit / Branch / Tag / SHA to checkout
        required: false
        default: ""

  workflow_call:
    inputs:
      tag:
        description: Commit / Branch / Tag / SHA to checkout
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  test:
    uses: bagofseeds/actions/.github/workflows/test-matrix.yaml@bad7219d1cc6280a38fbcffd35ff71314a694bb9
    with:
      tag: ${{ inputs.tag }}
